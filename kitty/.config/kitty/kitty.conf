# KITTY — Terminal emulator
# QUÉ EDITAR:
#   font_size            → tamaño de fuente
#   background_opacity   → transparencia (0.0 – 1.0)
#   font_family          → fuente (Maple Mono NF, JetBrainsMono Nerd Font, etc.)
#   window_padding_width → padding interno (vertical horizontal)
#
# TEMA: Catppuccin Mocha definido inline (no requiere archivo externo)
# Para cambiar tema: `kitten themes` descarga y aplica temas oficiales,
# o descarga uno de https://github.com/catppuccin/kitty y ponlo en
# ~/.config/kitty/themes/ luego usa: include themes/Catppuccin-Mocha.conf
#
# Recarga de config en caliente: ctrl+shift+f5  (o guardar este archivo)

# ── Fuente ────────────────────────────────────────────────────
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# ── Ventana ───────────────────────────────────────────────────
background_opacity      0.92
hide_window_decorations yes
remember_window_size    no
window_padding_width    4 8
initial_window_width    120c
initial_window_height   32c
confirm_close_surface   no

# ── Cursor ────────────────────────────────────────────────────
# kitty usa `beam` como shape de cursor (formato de kitty.conf)
cursor_shape              beam
cursor_blink_interval     0.5
cursor_stop_blinking_after 15.0
mouse_hide_wait           3.0

# ── Clipboard ─────────────────────────────────────────────────
copy_on_select clipboard

# ── Scrollback ────────────────────────────────────────────────
scrollback_lines 10000

# ── Tabs ──────────────────────────────────────────────────────
tab_bar_edge       bottom
tab_bar_style      powerline
tab_bar_min_tabs   1
tab_separator      " ┇"
tab_bar_align      center

# ── Bordes (coherente con Hyprland Theme.mauve/blue) ──────────
active_border_color   #cba6f7
inactive_border_color #313244

# ── Colores: Catppuccin Mocha ─────────────────────────────────
# Fondo / texto principal
foreground              #cdd6f4
background              #1e1e2e

# Cursor y selección
cursor                  #f5e0dc
cursor_text_color       #1e1e2e
selection_foreground    #cdd6f4
selection_background    #585b70

# Colores ANSI 0-7 (normales)
color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #bac2de

# Colores ANSI 8-15 (brillantes)
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8
