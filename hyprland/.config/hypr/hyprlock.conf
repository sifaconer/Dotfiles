# ╔══════════════════════════════════════════════════════════════╗
# ║  HYPRLOCK — Lock screen (sigue en hyprlang, no Lua)          ║
# ║  QUÉ EDITAR: colores, path wallpaper, widgets                ║
# ║  Widgets: background, input-field, label, image, shape       ║
# ║  Variables: $TIME, $USER, $LAYOUT, $PAMFAIL                  ║
# ╚══════════════════════════════════════════════════════════════╝

general {
    grace = 3
    hide_cursor = true
}

background {
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.7
}

label {
    text = $TIME
    font_size = 90
    font_family = Maple Mono NF
    color = rgba(cdd6f4ff)
    position = 0, 200
    halign = center
    valign = center
}

label {
    text = cmd[update:3600000] date +"%A, %B %d"
    font_size = 22
    font_family = Inter
    color = rgba(bac2deff)
    position = 0, 110
    halign = center
    valign = center
}

label {
    text = Hi, $USER
    font_size = 18
    font_family = Inter
    color = rgba(cba6f7ff)
    position = 0, 40
    halign = center
    valign = center
}

input-field {
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(313244ff)
    inner_color = rgba(1e1e2eff)
    font_color = rgba(cdd6f4ff)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = rgba(a6e3a1ff)
    fail_color = rgba(f38ba8ff)
    fail_text = <i>$PAMFAIL</i>
    position = 0, -50
    halign = center
    valign = center
}
