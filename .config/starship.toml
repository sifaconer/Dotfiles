# STARSHIP — Prompt. QUÉ EDITAR: format string, module configs, palette
# Docs: https://starship.rs/config/

format = """
[](mauve)\
$os\
$username\
[](bg:blue fg:mauve)\
$directory\
[](fg:blue bg:green)\
$git_branch\
$git_status\
[](fg:green bg:surface0)\
$nodejs\
$rust\
$golang\
$python\
$docker_context\
[](fg:surface0)\
$character"""

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

[os]
disabled = false
style = "bg:mauve fg:crust"
[os.symbols]
Arch = " "

[username]
show_always = false
style_user = "bg:mauve fg:crust"
format = "[$user ]($style)"

[directory]
style = "bg:blue fg:crust"
format = "[ $path ]($style)"
truncation_length = 3

[git_branch]
style = "bg:green fg:crust"
format = "[ $symbol$branch ]($style)"
symbol = " "

[git_status]
style = "bg:green fg:crust"
format = "[$all_status$ahead_behind ]($style)"

[nodejs]
style = "bg:surface0 fg:text"
format = "[ $symbol($version) ]($style)"
symbol = " "

[rust]
style = "bg:surface0 fg:text"
format = "[ $symbol($version) ]($style)"
symbol = "🦀 "

[golang]
style = "bg:surface0 fg:text"
format = "[ $symbol($version) ]($style)"
symbol = " "

[python]
style = "bg:surface0 fg:text"
format = "[ $symbol($version) ]($style)"
symbol = " "

[docker_context]
style = "bg:surface0 fg:text"
format = "[ $symbol$context ]($style)"
symbol = " "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
