# YAZI — File manager TUI. QUÉ EDITAR: show_hidden, sort, linemode
[manager]
show_hidden = true
sort_by = "natural"
sort_dir_first = true
linemode = "size"

[preview]
max_width = 1000
max_height = 1000

[opener]
edit = [{ run = 'nvim "$@"', block = true, for = "unix" }]
open = [{ run = 'xdg-open "$@"', for = "unix" }]
